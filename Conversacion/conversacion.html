<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/fireworks.css">
    <title>Conversación</title>
    <style>
        #done {
            display: none;
            margin: 16px 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: #0a7a0a;
            text-align: center;
        }
    </style>
</head>
<body>
   <!-- <div class="header">
        <img src="images/logo.jpeg" alt="Logo">
        <h1>Conversación</h1>
    </div>
 -->
<div id="done" style="display:none; background:#dff7df; padding:12px; margin:16px 0; text-align:center; font-size:20px; font-weight:bold;">
  <div class="header">
        <img src="images/logo.jpeg" alt="Logo">
        <h1>Conversación</h1>
    </div>
</div>

    <div class="gallery" id="gallery"></div>
    
    <script>
        const gallery = document.getElementById('gallery');
        const done = document.getElementById('done');
        
        for (let i = 1; i <= 27; i++) {
            const num = i.toString().padStart(3, '0');
            const imageName = `IMG_${num}.jpeg`;
            
            const link = document.createElement('a');
            link.href = `photo.html?image=${imageName}`;
            
            const img = document.createElement('img');
            img.src = `images/${imageName}`;
            img.alt = `Photo ${i}`;
            
            link.appendChild(img);
            gallery.appendChild(link);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js');
        }

       window.addEventListener('load', () => {
  const done = document.getElementById('done');
  done.style.display = 'block';
  console.log('Page loaded, showing Done');
});

    </script>
</body>
</html>
