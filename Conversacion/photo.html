<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Conversación</title>
        <link rel="stylesheet" href="css/fireworks.css">
        <style>
            #photo {
                max-width: 30%;
                height: auto;
            }

            #photo.wide-image {
                max-width: 85%;
            }
        </style>
    </head>
    <body>
        <a href="conversacion.html" class="header-link">
            <div class="header">
                <img src="images/logo.jpeg" alt="Logo">
                <h1>Conversación</h1>
            </div>
        </a>

        <figure id="photoFigure">
            <img id="photo" src="" alt="Photo" loading="eager">
            <figcaption id="photoCaption"></figcaption>
        </figure>

        <a id="prevBtn" class="prev-btn" href="#">Previous</a>
        <a id="nextBtn" class="next-btn" href="#">Next</a>

        <script>
            const urlParams = new URLSearchParams(window.location.search);
            const imageName = urlParams.get('image');
            const photo = document.getElementById('photo');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            const captions = {
                "IMG_001.jpeg": "Bodega Vasconia",
                "IMG_002.jpeg": "Bodega Vasconia Bar",
                "IMG_003.jpeg": "Tarta de Queso Vasca",
                "IMG_004.jpeg": "Bilbao Pinchos",
                "IMG_005.jpeg": "Tamaño real",
                "IMG_006.jpeg": "Aldeanueva del Ebro",
                "IMG_007.jpeg": "Ronda",
                "IMG_008.jpeg": "Salmorejo",
                "IMG_009.jpeg": "Costa Brava",
                "IMG_010.jpeg": "Banyoles",
                "IMG_011.jpeg": "Pausa obligatoria para hidratación",
                "IMG_012.jpeg": "Via Verdes",
                "IMG_013.jpeg": "Dali",
                "IMG_014.jpeg": "Cata de Vinos",
                "IMG_015.jpeg": "Morcilla Tres Formas",
                "IMG_016.jpeg": "Pinchos",
                "IMG_017.jpeg": "Tortilla",
                "IMG_018.jpeg": "Hornazo",
                "IMG_019.jpeg": "Debajo del escritorio de mi habitación",
                "IMG_020.jpeg": "Desayuno",
                "IMG_021.jpeg": "No puedo ...",
                "IMG_022.jpeg": "... controlarme.",
                "IMG_023.jpeg": "Valencia",
                "IMG_024.jpeg": "Salamanca"
            };

            const TOTAL_IMAGES = 24;
            const IMAGE_DIR = 'images/compressed';

            function setCaption(name) {
                document.getElementById('photoCaption').textContent = captions[name] || "";
            }

            function applyImageStyle(img, name) {
                img.classList.remove('wide-image');
                if (name === 'IMG_026.jpeg') {
                    img.classList.add('wide-image');
                }
            }

            function preloadImage(src) {
                const img = new Image();
                img.src = src;
            }

            function padNum(n) {
                return n.toString().padStart(3, '0');
            }

            if (imageName) {
                photo.src = `${IMAGE_DIR}/${imageName}`;

                photo.onload = () => {
                    applyImageStyle(photo, imageName);
                    setCaption(imageName);
                };

                if (photo.complete) {
                    applyImageStyle(photo, imageName);
                    setCaption(imageName);
                }

                const numberMatch = imageName.match(/IMG_(\d+)/);
                if (numberMatch) {
                    const currentNum = parseInt(numberMatch[1], 10);

                    if (currentNum < TOTAL_IMAGES) {
                        const nextImage = `IMG_${padNum(currentNum + 1)}.jpeg`;
                        nextBtn.href = `photo.html?image=${nextImage}`;
                        nextBtn.style.display = 'inline-block';
                        preloadImage(`${IMAGE_DIR}/${nextImage}`);
                    } else {
                        nextBtn.style.display = 'none';
                    }

                    if (currentNum > 1) {
                        const prevImage = `IMG_${padNum(currentNum - 1)}.jpeg`;
                        prevBtn.href = `photo.html?image=${prevImage}`;
                        prevBtn.style.display = 'inline-block';
                        preloadImage(`${IMAGE_DIR}/${prevImage}`);
                    } else {
                        prevBtn.style.display = 'none';
                    }
                }
            } else {
                photo.src = 'images/placeholder.jpg';
                photo.onload = () => applyImageStyle(photo, 'placeholder.jpg');
                if (photo.complete) applyImageStyle(photo, 'placeholder.jpg');
                alert('No image specified');
            }
        </script>
    </body>
</html>
